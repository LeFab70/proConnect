# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and Deploy .NET Backend

on:
  push:
    branches: [ "kayleb" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Install dotnet-ef
        run: dotnet tool install --global dotnet-ef

      - name: Restore
        run: dotnet restore ./backend/backend.csproj

      - name: Test Build
        run: dotnet build ./backend/backend.csproj --configuration Release

      # ---------------------------------------------------
      # 1. Générer migration auto
      # ---------------------------------------------------
      - name: Generate EF Core Migration
        run: |
          $timestamp = Get-Date -Format "yyyyMMddHHmm"
          dotnet ef migrations add AutoMigration_$timestamp `
            --project ./backend/backend.csproj `
            --startup-project ./backend/backend.csproj
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.NEON_CONNECTION_STRING }}

      # ---------------------------------------------------
      # 2. Appliquer migration sur Neon
      # ---------------------------------------------------
      - name: Apply Migration to Neon
        run: |
          dotnet ef database update `
            --project ./backend/backend.csproj `
            --startup-project ./backend/backend.csproj `
            --connection "$env:ConnectionStrings__DefaultConnection"
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.NEON_CONNECTION_STRING }}

      # ---------------------------------------------------
      # 3. Commit migration
      # ---------------------------------------------------
      - name: Commit migration
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          git add backend/Migrations
          git commit -m "Auto EF Migration" || echo "No changes to commit"
          git push

      # ---------------------------------------------------
      # 4. Build final
      # ---------------------------------------------------
      - name: Build
        run: dotnet build ./backend/backend.csproj --configuration Release --no-restore

      # ---------------------------------------------------
      # 5. Publish
      # ---------------------------------------------------
      - name: Publish
        run: dotnet publish ./backend/backend.csproj -c Release -o ./publish

      # ---------------------------------------------------
      # 6. Upload artifact
      # ---------------------------------------------------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend
          path: ./publish

  deploy:
    runs-on: windows-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: backend
          path: ./backend

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'ProConnectNB'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: ./backend